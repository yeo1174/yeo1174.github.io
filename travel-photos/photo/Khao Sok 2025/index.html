<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Khao Sok 2025 — Travel Photos</title>
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
 <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }
  body { font-family: 'Inter', sans-serif; background: #0c0c0c; color: #e8e4e0; min-height: 100vh; }
  a { color: inherit; text-decoration: none; }

  .header { max-width: 1200px; margin: 0 auto; padding: 36px 32px 20px; display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .header h1 { font-family: 'Playfair Display', serif; font-weight: 400; font-size: 20pt; letter-spacing: 0.02em; color: #f0ece6; }
  .header .back-link { font-size: 9pt; font-weight: 300; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; transition: color .25s; }
  .header .back-link:hover { color: rgba(255,255,255,0.7); }

  .intro { max-width: 1200px; margin: 0 auto; padding: 60px 32px 30px; }
  .intro h2 { font-family: 'Playfair Display', serif; font-weight: 400; font-size: 28pt; color: #f0ece6; margin-bottom: 8px; }
  .intro p { font-size: 10pt; font-weight: 300; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; }

  .gallery { max-width: 1200px; margin: 0 auto; padding: 0 32px 80px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .gallery .photo { display: block; border-radius: 2px; overflow: hidden; position: relative; cursor: pointer; aspect-ratio: 4/3; background: rgba(255,255,255,0.02); }
  .gallery .photo img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity .4s; }
  .gallery .photo:hover img { opacity: 0.75; }
  .gallery .photo .caption { position: absolute; bottom: 0; left: 0; right: 0; padding: 30px 16px 14px; background: linear-gradient(to top, rgba(0,0,0,0.6), transparent); font-size: 9pt; font-weight: 300; color: rgba(255,255,255,0.6); opacity: 0; transition: opacity .3s; pointer-events: none; }
  .gallery .photo:hover .caption { opacity: 1; }

  footer { max-width: 1200px; margin: 0 auto; padding: 10px 32px 40px; font-size: 8pt; color: rgba(255,255,255,0.15); text-align: center; }

  @media (max-width: 800px) { .gallery { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) {
   .header { padding: 28px 20px 16px; flex-direction: column; gap: 6px; }
   .header h1 { font-size: 16pt; }
   .intro { padding: 40px 20px 20px; }
   .intro h2 { font-size: 22pt; }
   .gallery { grid-template-columns: 1fr; padding: 0 20px 60px; }
  }
 </style>
</head>
<body>

<div class="header">
 <h1>Khao Sok 2025</h1>
 <a href="/travel-photos/" class="back-link">&larr; Travel Photos</a>
</div>

<div class="intro">
 <h2>Khao Sok 2025</h2>
 <p>Cheow Lan Lake &mdash; limestone karsts, floating bungalows</p>
</div>

<div class="gallery">

 <a href="Ban%20Chiao%20Lan.png" class="photo" target="_blank">
  <img src="Ban%20Chiao%20Lan.png" alt="Ban Chiao Lan" loading="lazy">
  <div class="caption">Ban Chiao Lan</div>
 </a>

 <a href="sunset%20ban%20chiao%20lan.png" class="photo" target="_blank">
  <img src="sunset%20ban%20chiao%20lan.png" alt="Sunset Ban Chiao Lan" loading="lazy">
  <div class="caption">Sunset at Ban Chiao Lan</div>
 </a>

 <a href="ratchaprapha%20dam.png" class="photo" target="_blank">
  <img src="ratchaprapha%20dam.png" alt="Ratchaprapha Dam" loading="lazy">
  <div class="caption">Ratchaprapha Dam</div>
 </a>

 <a href="ratchaprapha%20dam%201.png" class="photo" target="_blank">
  <img src="ratchaprapha%20dam%201.png" alt="Ratchaprapha Dam" loading="lazy">
  <div class="caption">Ratchaprapha Dam</div>
 </a>

 <a href="ratchaprapha%20dam%202.png" class="photo" target="_blank">
  <img src="ratchaprapha%20dam%202.png" alt="Ratchaprapha Dam" loading="lazy">
  <div class="caption">Ratchaprapha Dam</div>
 </a>

 <a href="ratchaprapha%203.png" class="photo" target="_blank">
  <img src="ratchaprapha%203.png" alt="Ratchaprapha" loading="lazy">
  <div class="caption">Ratchaprapha</div>
 </a>

</div>

<footer>
 Yeo Family Travels &middot; Khao Sok 2025
</footer>

</body>
</html>
