<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Travel Photos — Yeo Family</title>
 <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
 <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-font-smoothing: antialiased; }
  body { font-family: 'Inter', sans-serif; background: #0c0c0c; color: #e8e4e0; min-height: 100vh; }
  a { color: inherit; text-decoration: none; }

  .header { max-width: 1200px; margin: 0 auto; padding: 36px 32px 20px; display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .header h1 { font-family: 'Playfair Display', serif; font-weight: 400; font-size: 20pt; letter-spacing: 0.02em; color: #f0ece6; }
  .header .back-link { font-size: 9pt; font-weight: 300; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; transition: color .25s; }
  .header .back-link:hover { color: rgba(255,255,255,0.7); }

  .intro { max-width: 1200px; margin: 0 auto; padding: 60px 32px 30px; }
  .intro h2 { font-family: 'Playfair Display', serif; font-weight: 400; font-size: 32pt; color: #f0ece6; margin-bottom: 12px; }
  .intro p { font-size: 11pt; font-weight: 300; color: rgba(255,255,255,0.5); max-width: 500px; line-height: 1.8; }

  .albums { max-width: 1200px; margin: 0 auto; padding: 0 32px 80px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .album-card { position: relative; display: block; overflow: hidden; border-radius: 4px; background: rgba(255,255,255,0.02); }
  .album-card img { width: 100%; height: auto; display: block; transition: transform .5s; }
  .album-card:hover img { transform: scale(1.03); }
  .album-card .info { padding: 16px 0; }
  .album-card .info .title { font-size: 11pt; font-weight: 400; color: #d0ccc6; letter-spacing: 0.02em; }
  .album-card .info .meta { font-size: 8pt; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; font-weight: 600; }
  .album-card .empty { aspect-ratio: 4/3; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; font-size: 14pt; color: rgba(255,255,255,0.08); font-family: 'Inter', sans-serif; font-weight: 200; }

  footer { max-width: 1200px; margin: 0 auto; padding: 10px 32px 40px; font-size: 8pt; color: rgba(255,255,255,0.15); text-align: center; }

  @media (max-width: 800px) { .albums { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 500px) {
   .header { padding: 28px 20px 16px; flex-direction: column; gap: 6px; }
   .header h1 { font-size: 16pt; }
   .intro { padding: 40px 20px 20px; }
   .intro h2 { font-size: 22pt; }
   .albums { grid-template-columns: 1fr; padding: 0 20px 60px; }
  }
 </style>
</head>
<body>

<div class="header">
 <h1>Travel Photos</h1>
 <a href="/" class="back-link">&larr; Yeo Family Travels</a>
</div>

<div class="intro">
 <h2>Past Trips</h2>
 <p>Photo albums from journeys we've taken. Real moments, real places.</p>
</div>

<div class="albums">

 <a href="/travel-photos/photo/New%20Zealand%202025/" class="album-card">
  <div class="empty">&#128247;</div>
  <div class="info">
   <div class="title">New Zealand 2025</div>
   <div class="meta">Past trip &middot; Photos coming</div>
  </div>
 </a>

</div>

<footer>
 Yeo Family Travels &middot; Travel Photos
</footer>

</body>
</html>
